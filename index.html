<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gestión de Servicios">
<meta name="theme-color" content="#1a3a6b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Gestión de Servicios</title>
<style>
:root{
  --bg:#f5f7fa;--surface:#fff;--surface2:#f0f4f8;--border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --blue:#1a3a6b;--blue-light:#e8f0fb;--blue-text:#1a3a6b;
  --green:#16a34a;--green-light:#f0fdf4;--green-text:#15803d;
  --yellow:#d97706;--yellow-light:#fffbeb;--yellow-text:#92400e;
  --red:#dc2626;--red-light:#fef2f2;--red-text:#991b1b;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#334155;--border2:#475569;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --blue-light:#1e3a5f;--blue-text:#93c5fd;
  --green-light:#14532d;--green-text:#86efac;
  --yellow-light:#451a03;--yellow-text:#fcd34d;
  --red-light:#450a0a;--red-text:#fca5a5;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:var(--bg);color:var(--text)}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#app{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
#app.visible{display:flex}
.topbar{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600}
.user-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:var(--radius-sm);padding:5px 10px;font-size:12px}
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;-webkit-overflow-scrolling:touch}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;color:var(--text3);font-size:10px;gap:3px;min-height:56px}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}
.nav-btn.active svg{stroke-width:2.2}
.page{display:none;padding:16px}
.page.active{display:block}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:18px;font-weight:700;letter-spacing:-.4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;font-weight:500;white-space:nowrap;cursor:pointer}
.btn:active{opacity:.8;transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sm{padding:6px 11px;font-size:13px}
.btn-xs{padding:4px 8px;font-size:12px}
.btn-danger{background:var(--red-light);color:var(--red-text);border-color:transparent}
.btn-success{background:var(--green-light);color:var(--green-text);border-color:transparent}
.btn-block{display:flex;width:100%;margin-top:8px}
.scard{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.scard-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.scard-name{font-weight:600;font-size:15px;letter-spacing:-.2px}
.scard-meta{font-size:13px;color:var(--text2);margin-top:2px;line-height:1.5}
.scard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;gap:6px}
.arow{display:flex;gap:6px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}
.bp{background:var(--yellow-light);color:var(--yellow-text)}
.bpr{background:var(--blue-light);color:var(--blue-text)}
.bd{background:var(--green-light);color:var(--green-text)}
.bb{background:var(--surface2);color:var(--text2)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600;color:var(--text2)}
.field input,.field select,.field textarea{padding:10px 12px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:15px;outline:none;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{padding:6px 12px;border-radius:20px;font-size:13px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);font-weight:500;cursor:pointer;user-select:none}
.chip.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.acw{position:relative}
.acl{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--blue);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);z-index:500;max-height:150px;overflow-y:auto;box-shadow:var(--shadow)}
.aci{padding:9px 12px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border)}
.aci:last-child{border-bottom:none}
.aci:active{background:var(--blue-light)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:95vh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.mhandle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:17px;font-weight:700;margin-bottom:16px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.ihead{display:grid;grid-template-columns:40px 1fr 76px 68px 26px;gap:5px;margin-bottom:4px}
.ihead span{font-size:11px;font-weight:600;color:var(--text3)}
.irow{display:grid;grid-template-columns:40px 1fr 76px 68px 26px;gap:5px;align-items:center;margin-bottom:6px}
.irow input{padding:7px 6px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;width:100%;outline:none}
.irow input:focus{border-color:var(--blue)}
.tbtn{padding:6px 2px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;text-align:center;width:100%}
.tbtn.ingreso{background:var(--green-light);color:var(--green-text);border-color:var(--green-text)}
.tbtn.costo{background:var(--blue-light);color:var(--blue-text);border-color:var(--blue-text)}
.tbtn.gasto{background:var(--red-light);color:var(--red-text);border-color:var(--red-text)}
.dbtn{width:26px;height:32px;border:none;background:none;color:var(--text3);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px}
.dbtn:active{background:var(--red-light);color:var(--red-text)}
.abtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:1.5px dashed var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text2);font-size:13px;cursor:pointer;width:100%;margin-top:4px}
.resumen{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-top:10px;border:1px solid var(--border)}
.rrow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.rrow.tot{font-weight:700;font-size:15px;border-top:1px solid var(--border2);margin-top:6px;padding-top:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:var(--surface2);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.sc.full{grid-column:1/-1}
.slabel{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:4px}
.sval{font-size:20px;font-weight:700}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-size:16px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dname{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0}
.cal-day{min-height:44px;border-radius:var(--radius-sm);padding:4px;background:var(--surface);border:1px solid var(--border);cursor:pointer}
.cal-day:active{background:var(--surface2)}
.cal-day.today{border-color:var(--blue);background:var(--blue-light)}
.cal-day.other{opacity:.3}
.cal-day.hev{border-color:var(--blue)}
.cal-dnum{font-size:11px;font-weight:600;color:var(--text2)}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--blue)}
.cal-cnt{font-size:10px;color:var(--blue-text);font-weight:600}
.fbar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.fbar select,.fbar input{padding:7px 10px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.alert{padding:11px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px}
.aw{background:var(--yellow-light);color:var(--yellow-text)}
.ai{background:var(--blue-light);color:var(--blue-text)}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-size:12px;font-weight:600;color:var(--text2)}
.tbl td{padding:10px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.lcard{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:28px 24px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.llogo{width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.ltitle{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.lsub{font-size:14px;color:var(--text2);margin-bottom:24px}
.leg{display:flex;gap:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ── ESTILOS DE IMPRESIÓN ─────────────────────────────────────────── */
@media print {
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area {
    position: fixed; top: 0; left: 0;
    width: 210mm; min-height: 297mm;
    margin: 0; padding: 0;
    background: #fff;
  }
  @page { size: A4; margin: 0; }
}

/* ── CALCULADORA FLOTANTE ─────────────────────────────────────────── */
.calc-overlay{position:fixed;inset:0;z-index:400;display:flex;align-items:flex-end;justify-content:center}
.calc-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:360px;padding:16px;box-shadow:0 -4px 24px rgba(0,0,0,.2)}
.calc-screen{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;text-align:right}
.calc-expr{font-size:13px;color:var(--text3);min-height:18px;word-break:break-all}
.calc-result{font-size:28px;font-weight:700;color:var(--text);word-break:break-all}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.calc-btn{padding:16px 8px;border-radius:var(--radius-sm);border:none;font-size:18px;font-weight:600;cursor:pointer;transition:opacity .1s}
.calc-btn:active{opacity:.7}
.calc-btn.num{background:var(--surface2);color:var(--text)}
.calc-btn.op{background:#1a3a6b;color:#fff}
.calc-btn.eq{background:var(--blue);color:#fff;grid-column:span 2}
.calc-btn.clear{background:var(--red-light);color:var(--red-text)}
.calc-btn.back{background:var(--surface2);color:var(--text2)}
.calc-btn.close-btn{background:var(--surface2);color:var(--text2);font-size:13px}
</style>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<div id="login-screen">
  <div class="lcard">
    <div id="logo-empresa-login" style="display:flex;justify-content:center;margin-bottom:12px">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="width:160px;height:160px">
        <circle cx="60" cy="60" r="57" fill="#1a3a6b"/>
        <path id="arcTop" d="M 14,60 A 46,46 0 0,1 106,60" fill="none"/>
        <text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="8.5" font-weight="600" fill="#fff" letter-spacing="2.5"><textPath href="#arcTop" startOffset="50%" text-anchor="middle">CLIMATIZACIÓN</textPath></text>
        <path id="arcBot" d="M 14,60 A 46,46 0 0,0 106,60" fill="none"/>

          <line x1="-2.5" y1="5" x2="0" y2="6"/><line x1="2.5" y1="5" x2="0" y2="6"/>
          <line x1="4.2" y1="-1" x2="5.2" y2="-3"/><line x1="-4.2" y1="-1" x2="-5.2" y2="-3"/>
        </g>
        <text x="60" y="68" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="700" fill="#fff" letter-spacing="10" textLength="62" lengthAdjust="spacing">MD</text>
        <g transform="translate(60,87)"><polygon points="-4.5,-9 2.5,-9 -1.5,0 4.5,0 -4.5,11 -1,1.5 -6.5,1.5" fill="#fff"/></g>
      </svg>
    </div>
    <div class="ltitle" style="text-align:center;margin-bottom:2px">Gestión de Servicios</div>
    <div style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px">Marcelo Duarte</div>
    <div class="field"><label>Email</label>
      <input type="email" id="login-email" placeholder="usuario@md-servicios.com" autocomplete="email">
    </div>
    <div class="field"><label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="login-error" style="color:var(--red-text);font-size:13px;margin-bottom:8px;display:none;text-align:center"></div>
    <button class="btn btn-primary btn-block" id="login-btn" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div id="logo-topbar" style="width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="width:36px;height:36px;flex-shrink:0">
        <circle cx="60" cy="60" r="57" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
        <path id="arcTopTB" d="M 14,60 A 46,46 0 0,1 106,60" fill="none"/>
        <text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="8.5" font-weight="600" fill="#fff" letter-spacing="2.5">
          <textPath href="#arcTopTB" startOffset="50%" text-anchor="middle">CLIMATIZACIÓN</textPath>
        </text>
        <path id="arcBotTB" d="M 14,60 A 46,46 0 0,0 106,60" fill="none"/>
        <text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="8.5" font-weight="600" fill="#fff" letter-spacing="2.5">
          <textPath href="#arcBotTB" startOffset="50%" text-anchor="middle">ELECTRICIDAD</textPath>
        </text>
        <g transform="translate(60,34)" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
          <line x1="0" y1="-6" x2="0" y2="6"/>
          <line x1="-5.2" y1="-3" x2="5.2" y2="3"/>
          <line x1="-5.2" y1="3" x2="5.2" y2="-3"/>
          <line x1="-2.5" y1="-5" x2="0" y2="-6"/><line x1="2.5" y1="-5" x2="0" y2="-6"/>
          <line x1="4.2" y1="1" x2="5.2" y2="3"/><line x1="3" y1="4" x2="5.2" y2="3"/>
          <line x1="-4.2" y1="1" x2="-5.2" y2="3"/><line x1="-3" y1="4" x2="-5.2" y2="3"/>
          <line x1="-2.5" y1="5" x2="0" y2="6"/><line x1="2.5" y1="5" x2="0" y2="6"/>
          <line x1="4.2" y1="-1" x2="5.2" y2="-3"/><line x1="-4.2" y1="-1" x2="-5.2" y2="-3"/>
        </g>
        <text x="60" y="68" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="700" fill="#fff" letter-spacing="10" textLength="62" lengthAdjust="spacing">MD</text>
        <g transform="translate(60,87)">
          <polygon points="-4.5,-9 2.5,-9 -1.5,0 4.5,0 -4.5,11 -1,1.5 -6.5,1.5" fill="#fff"/>
        </g>
      </svg>
      </div>
      <div class="topbar-title">Servicios Técnicos</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;position:relative">
      <span id="sync-indicator" style="font-size:11px;color:rgba(255,255,255,0.7);transition:opacity .5s;opacity:0"></span>
      <span class="user-badge" id="topbar-user">Admin</span>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
      <button id="menu-btn" onclick="toggleMenu()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:var(--radius-sm);padding:4px 9px;font-size:20px;line-height:1;cursor:pointer">&#8942;</button>
      <div id="dropdown-menu" style="display:none;position:absolute;top:38px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:300;min-width:165px;overflow:hidden">
        <div onmousedown="toggleMenu();setTimeout(cambiarContrasena,50)" style="padding:12px 16px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:18px;height:18px;flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Cambiar contraseña

// ── FINANCIAL ────────────────────────────────────────────────────────
function calcFin(s){
  const items = s.items || [];
  const sum = tipo => items.filter(i=>i.tipo===tipo).reduce((a,i)=>a+Number(i.importe||0)*Number(i.qty||1),0);
  const ingresos = sum('ingreso'), costos = sum('costo'), gastos = sum('gasto');
  const totalCliente = ingresos + costos;
  const baseReparto  = ingresos - gastos;
  const tids = s.tecnicos || [];
  const n = tids.length || 1;
  let rMap = {};
  if(s.repartoManual && Object.keys(s.repartoManual).length){
    rMap = s.repartoManual;
  } else {
    tids.forEach(id=>{ rMap[id] = Math.round(baseReparto/n); });
  }
  return { ingresos, costos, gastos, totalCliente, baseReparto, rMap };
}

// ── CALCULADORA FLOTANTE ─────────────────────────────────────────────
var _calcInput = ''; // expresión completa que el usuario va armando

function abrirCalculadora(){
  _calcInput = '';
  renderCalc();
}

function fmtCalc(val){
  // Formatea número con puntos de miles y coma decimal (estilo argentino)
  if(val === '' || val === 'Error') return val;
  var n = parseFloat(val);
  if(isNaN(n)) return val;
  var parts = n.toFixed(n % 1 !== 0 ? 2 : 0).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return parts.length > 1 ? parts[0] + ',' + parts[1] : parts[0];
}

function renderCalc(){
  var root = document.getElementById('calc-root');
  if(!root) return;

  // Previsualizar resultado si la expresión es evaluable
  var preview = '';
  try {
    var expr = _calcInput.replace(/([0-9.]+)%/g, function(m,n){ return '('+n+'/100)'; });
    if(expr.trim()) {
      var r = Function('"use strict";return ('+expr+')')();
      if(isFinite(r)) preview = String(Math.round(r*100)/100);
    }
  } catch(e){}

  var html = '<div class="calc-overlay" onclick="if(event.target===this)cerrarCalc()">';
  html += '<div class="calc-box">';
  html += '<div class="calc-screen">';
  html += '<div class="calc-expr" id="calc-expr" style="font-size:20px;min-height:30px;word-break:break-all;color:var(--text);font-weight:500">'+escH(_calcInput||'')+'</div>';
  html += '<div class="calc-result" id="calc-result" style="font-size:15px;color:var(--text3);min-height:22px">'+escH(preview ? fmtCalc(preview) : '')+'</div>';
  html += '</div>';
  html += '<div class="calc-grid">';
  var btns = [
    {l:'C',  cls:'clear', a:"calcClear()"},
    {l:'←',  cls:'back',  a:"calcBack()"},
    {l:'(',  cls:'op',    a:"calcAppend('(')"},
    {l:')',  cls:'op',    a:"calcAppend(')')"},
    {l:'7',  cls:'num',   a:"calcAppend('7')"},
    {l:'8',  cls:'num',   a:"calcAppend('8')"},
    {l:'9',  cls:'num',   a:"calcAppend('9')"},
    {l:'÷',  cls:'op',    a:"calcAppend('/')"},
    {l:'4',  cls:'num',   a:"calcAppend('4')"},
    {l:'5',  cls:'num',   a:"calcAppend('5')"},
    {l:'6',  cls:'num',   a:"calcAppend('6')"},
    {l:'×',  cls:'op',    a:"calcAppend('*')"},
    {l:'1',  cls:'num',   a:"calcAppend('1')"},
    {l:'2',  cls:'num',   a:"calcAppend('2')"},
    {l:'3',  cls:'num',   a:"calcAppend('3')"},
    {l:'−',  cls:'op',    a:"calcAppend('-')"},
    {l:'%',  cls:'op',    a:"calcAppend('%')"},
    {l:'0',  cls:'num',   a:"calcAppend('0')"},
    {l:'.',  cls:'num',   a:"calcAppend('.')"},
    {l:'+',  cls:'op',    a:"calcAppend('+')"},
    {l:'=',  cls:'eq',    a:"calcEqual()"},
  ];
  btns.forEach(function(b){
    html += '<button class="calc-btn '+b.cls+'" onclick="'+b.a+'">'+b.l+'</button>';
  });
  html += '</div>';
  html += '<button class="calc-btn close-btn" onclick="cerrarCalc()" style="width:100%;margin-top:8px">Cerrar</button>';
  html += '</div></div>';
  root.innerHTML = html;
}

function cerrarCalc(){
  document.getElementById('calc-root').innerHTML = '';
}

function calcAppend(ch){
  // Evitar operadores dobles seguidos
  var ops = ['+','-','*','/'];
  var last = _calcInput.slice(-1);
  if(ops.indexOf(ch)>=0 && ops.indexOf(last)>=0){
    _calcInput = _calcInput.slice(0,-1);
  }
  _calcInput += ch;
  _updateCalc();
}

function calcClear(){
  _calcInput = '';
  _updateCalc();
}

function calcBack(){
  _calcInput = _calcInput.slice(0,-1);
  _updateCalc();
}

function calcEqual(){
  try {
    var expr = _calcInput;
    // Reemplazar X op N% por X op (X*N/100)
    // ej: 100000-3.5% => 100000-(100000*3.5/100)
    expr = expr.replace(/([0-9.]+)([+\-])([0-9.]+)%/g, function(m, base, op, pct){
      return base + op + '(' + base + '*' + pct + '/100)';
    });
    // Porcentajes simples restantes: N% => N/100
    expr = expr.replace(/([0-9.]+)%/g, function(m, n){
      return '(' + n + '/100)';
    });
    var result = Function('"use strict";return ('+expr+')')();
    result = Math.round(result * 100) / 100;
    _calcInput = String(result);
    // Mostrar con formato en el display principal
    var exprEl = document.getElementById('calc-expr');
    if(exprEl) exprEl.textContent = fmtCalc(String(result));
    var resEl = document.getElementById('calc-result');
    if(resEl) resEl.textContent = '';
  } catch(e){
    _calcInput = 'Error';
    _updateCalc();
    setTimeout(function(){ _calcInput=''; _updateCalc(); }, 1000);
  }
}

function fmtExpr(expr){
  // Formatea cada número dentro de la expresión con puntos de miles
  // pero deja los operadores y paréntesis intactos
  return expr.replace(/[0-9]+(\.[0-9]*)*/g, function(n){
    // No formatear si tiene punto decimal (está siendo escrito)
    if(n.indexOf('.') >= 0){
      var parts = n.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return parts[0] + ',' + (parts[1] || '');
    }
    return n.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  });
}

function _updateCalc(){
  var exprEl = document.getElementById('calc-expr');
  var resEl = document.getElementById('calc-result');
  if(exprEl) exprEl.textContent = _calcInput === 'Error' ? 'Error' : fmtExpr(_calcInput);

  // Preview en tiempo real
  var preview = '';
  try {
    if(_calcInput && _calcInput !== 'Error'){
      var expr = _calcInput;
      expr = expr.replace(/([0-9.]+)([+\-])([0-9.]+)%/g, function(m,base,op,pct){
        return base+op+'('+base+'*'+pct+'/100)';
      });
      expr = expr.replace(/([0-9.]+)%/g, function(m,n){ return '('+n+'/100)'; });
      var r = Function('"use strict";return ('+expr+')')();
      if(isFinite(r) && String(r) !== _calcInput) preview = String(Math.round(r*100)/100);
    }
  } catch(e){}
  if(resEl) resEl.textContent = preview ? fmtCalc(preview) : '';
}

// Mantener compatibilidad (alias hacia calcAppend)
function calcNum(n){ calcAppend(n); }
function calcOp(o){ calcAppend(o); }
function calcParen(p){ calcAppend(p); }
function calcPct(){ calcAppend('%'); }



// ── EQUIPOS ───────────────────────────────────────────────────────────
var TIPOS_EQUIPO = ['Aire acondicionado','Heladera/Freezer','Bomba de agua','Extractor','Otro'];
var TIPOS_GAS    = ['R410A','R32','R22','R404A','R134a','Otro','N/A'];
var _equipoEditandoId = null;

function equipoTienePedidoPendiente(eqId){
  // Retorna true si hay un pedido pendiente (no facturado) vinculado al equipo
  return (db.servicios||[]).some(function(s){
    return s.equipoId===eqId && !s.facturado;
  });
}

function equiposVencidos(){
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var en7  = new Date(hoy); en7.setDate(hoy.getDate()+7);
  return (db.equiposDB||[]).filter(function(e){
    if(!e.proximoServicio) return false;
    // Si ya tiene un pedido pendiente asociado, no mostrar notificación
    if(equipoTienePedidoPendiente(e.id)) return false;
    var d = new Date(e.proximoServicio); d.setHours(0,0,0,0);
    return d <= en7; // vencido o dentro de los próximos 7 días
  });
}

function actualizarBadgeEquipos(){
  var n = equiposVencidos().length;
  var b = document.getElementById('badge-equipos-menu');
  if(b){ b.textContent=n; b.style.display=n>0?'inline':'none'; }
}

  actualizarBadgeEquipos();

function filtrarEquipos(){
  var q = (document.getElementById('eq-search')||{}).value||'';
  var lista = (db.equiposDB||[]).filter(function(e){
    return !q || e.cliente.toLowerCase().includes(q.toLowerCase()) ||
      (e.marca||'').toLowerCase().includes(q.toLowerCase()) ||
      (e.modelo||'').toLowerCase().includes(q.toLowerCase());
  });
  var el = document.getElementById('eq-list');
  if(el) el.innerHTML = renderEquiposList(lista);
}

function filtrarEquiposTipo(btn, tipo){
  document.querySelectorAll('#eq-filtros button').forEach(function(b){
    b.style.background='var(--surface2)'; b.style.color='var(--text2)'; b.style.borderColor='var(--border2)';
  });
  btn.style.background='var(--blue)'; btn.style.color='#fff'; btn.style.borderColor='var(--blue)';
  var lista = tipo ? (db.equiposDB||[]).filter(function(e){ return e.tipo===tipo; }) : (db.equiposDB||[]);
  var el = document.getElementById('eq-list');
  if(el) el.innerHTML = renderEquiposList(lista);
}

function renderEquiposList(lista){
  if(!lista||!lista.length) return '<div class="empty">No hay equipos cargados</div>';
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var en7 = new Date(hoy); en7.setDate(hoy.getDate()+7);
  return lista.map(function(e){
    var alerta = '';
    var tienePedido = equipoTienePedidoPendiente(e.id);
    if(e.proximoServicio && !tienePedido){
      var d = new Date(e.proximoServicio); d.setHours(0,0,0,0);
      if(d < hoy) alerta = '<span style="background:var(--red-light);color:var(--red-text);font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px">⚠️ Vencido</span>';
      else if(d <= en7) alerta = '<span style="background:var(--yellow-light);color:var(--yellow-text);font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px">⏰ Esta semana</span>';
    } else if(tienePedido){
      alerta = '<span style="background:var(--green-light);color:var(--green-text);font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px">✅ Pedido activo</span>';
    }
    var historial = (db.servicios||[]).filter(function(s){ return s.equipoId===e.id; });
    return '<div class="scard" style="margin-bottom:8px;padding:12px">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
      '<div style="flex:1">' +
      '<div style="font-weight:700;font-size:15px">'+(e.serie?'S/N: '+escH(e.serie)+' · ':'')+escH(e.modelo||'')+' '+escH(e.marca||'')+alerta+'</div>' +
      '<div class="scard-meta">'+escH(e.tipo||'')+(e.capacidad?' · '+escH(e.capacidad):'')+(e.gas?' · Gas: '+escH(e.gas):'')+(e.ubicacion?' · 📍 '+escH(e.ubicacion):'')+'</div>' +
      '<div class="scard-meta">👤 '+escH(e.cliente)+'</div>' +
      (e.proximoServicio?'<div class="scard-meta">🔧 Próx. servicio: <strong>'+fmtDate(e.proximoServicio)+'</strong></div>':'')+
      (historial.length?'<div class="scard-meta" style="color:var(--text3)">📋 '+historial.length+' servicio'+(historial.length>1?'s':'')+' registrados</div>':'')+
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:4px">' +
      '<button class="btn btn-xs" data-eid="'+e.id+'" onclick="abrirFormEquipo(this.dataset.eid)">Editar</button>' +
      '<button class="btn btn-xs btn-primary" data-eid="'+e.id+'" onclick="generarPedidoDesdeEquipo(this.dataset.eid)">+ Pedido</button>' +
      '</div>' +
      '</div></div>';
  }).join('');
}

function agregarHistorialEquipo(){
  var fecha = document.getElementById('eq-hist-fecha').value;
  var desc  = document.getElementById('eq-hist-desc').value.trim();
  if(!desc){ showAlert('Escribí una descripción'); return; }
  if(!_equipoEditandoId){ showAlert('Guardá el equipo primero'); return; }
  var eq = (db.equiposDB||[]).find(function(x){ return x.id===_equipoEditandoId; });
  if(!eq) return;
  if(!eq.historial) eq.historial = [];
  eq.historial.push({ fecha: fecha||new Date().toISOString().split('T')[0], descripcion: desc });
  // Actualizar también el próximo servicio según frecuencia
  if(eq.frecuenciaMeses){
    var d = new Date(fecha||new Date());
    d.setMonth(d.getMonth()+eq.frecuenciaMeses);
    eq.proximoServicio = d.toISOString().split('T')[0];
  }
  saveDB();
  actualizarBadgeEquipos();
  abrirFormEquipo(_equipoEditandoId);
}

function eliminarHistorialEquipo(idx){
  var eq = (db.equiposDB||[]).find(function(x){ return x.id===_equipoEditandoId; });
  if(!eq||!eq.historial) return;
  eq.historial.splice(idx,1);
  saveDB();
  abrirFormEquipo(_equipoEditandoId);
}

function guardarEquipo(){
  var cliente = document.getElementById('eq-cliente').value.trim();
  var tipo    = document.getElementById('eq-tipo').value;
  if(!cliente){ showAlert('Seleccioná un cliente'); return; }
  var freq = parseInt(document.getElementById('eq-freq').value||6);
  var prox = document.getElementById('eq-prox').value;
  // Si no tiene fecha próxima pero tiene frecuencia, calcularla desde hoy
  if(!prox && freq){
    var d = new Date(); d.setMonth(d.getMonth()+freq);
    prox = d.toISOString().split('T')[0];
  }
  var data = {
    cliente:          cliente,
    tipo:             tipo,
    marca:            document.getElementById('eq-marca').value.trim(),
    modelo:           document.getElementById('eq-modelo').value.trim(),
    serie:            document.getElementById('eq-serie').value.trim(),
    capacidad:        document.getElementById('eq-cap').value.trim(),
    gas:              document.getElementById('eq-gas').value,
    ubicacion:        document.getElementById('eq-ubic').value.trim(),
    fechaInstalacion: document.getElementById('eq-inst').value,
    frecuenciaMeses:  freq,
    proximoServicio:  prox,
    notas:            '',
  };
  if(!db.equiposDB) db.equiposDB = [];
  if(_equipoEditandoId){
    var eq = db.equiposDB.find(function(x){ return x.id===_equipoEditandoId; });
    if(eq) Object.assign(eq, data);
  } else {
    data.id = 'eq_'+(Date.now());
    db.equiposDB.push(data);
  }
  saveDB();
  actualizarBadgeEquipos();
  _equipoEditandoId = null;
  closeModal();
  abrirEquipos();
}

function eliminarEquipo(){
  showConfirm('¿Eliminar este equipo?', function(){
    db.equiposDB = (db.equiposDB||[]).filter(function(e){ return e.id!==_equipoEditandoId; });
    saveDB();
    actualizarBadgeEquipos();
    _equipoEditandoId = null;
    closeModal();
    abrirEquipos();
  });
}

function generarPedidoDesdeEquipo(eqId){
  var eq = (db.equiposDB||[]).find(function(x){ return x.id===eqId; });
  if(!eq) return;

  // Buscar datos del cliente
  var cli = (db.clientesDB||[]).find(function(c){ return c.nombre===eq.cliente; }) || {};

  // Crear pedido pendiente
  var hoy = new Date().toISOString().split('T')[0];
  var desc = 'Mantenimiento: '+(eq.marca||'')+' '+(eq.modelo||'')+(eq.ubicacion?' · '+eq.ubicacion:'');

  var pedido = {
    id:          db.nextId++,
    facturado:   false,
    estado:      'Pendiente',
    cliente:     eq.cliente,
    telefono:    cli.telefono||'',
    direccion:   cli.direccion||'',
    zona:        cli.zona||'',
    tipo:        'Reparación',
    fecha:       hoy,
    hora:        '',
    descripcion: desc.trim(),
    tecnicos:    [],
    equipoId:    eq.id,
    items:       [{qty:1, desc:'Mano de obra', importe:'', tipo:'ingreso'}],
    repartoManual: {}
  };

  db.servicios.push(pedido);

  // Actualizar próximo servicio del equipo según frecuencia
  if(eq.frecuenciaMeses){
    var prox = new Date();
    prox.setMonth(prox.getMonth() + eq.frecuenciaMeses);
    eq.proximoServicio = prox.toISOString().split('T')[0];
  }

  saveDB();
  actualizarBadgeEquipos();
  closeModal();

  // Ir a pendientes y abrir el pedido para editar
  showPage('pendientes', document.getElementById('nav-pendientes'));
  setTimeout(function(){ openServiceModal(pedido.id); }, 200);
}

function cambiarContrasena(){
  var html = '<div class="mtitle">🔒 Cambiar contraseña</div>';
  html += '<div style="font-size:13px;color:var(--text2);margin-bottom:14px">Ingresá tu nueva contraseña. Usá al menos 8 caracteres con letras y números.</div>';
  html += '<div class="field"><label>Contraseña actual</label><input type="password" id="cp-actual" placeholder="••••••••"></div>';
  html += '<div class="field"><label>Nueva contraseña</label><input type="password" id="cp-nueva" placeholder="Mínimo 8 caracteres"></div>';
  html += '<div class="field"><label>Repetir nueva contraseña</label><input type="password" id="cp-repetir" placeholder="Repetí la nueva contraseña"></div>';
  html += '<div id="cp-error" style="color:var(--red-text);font-size:13px;margin-bottom:8px;display:none"></div>';
  html += '<div class="mfoot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarNuevaContrasena()">Guardar</button></div>';
  showModal(html);

function guardarNuevaContrasena(){
  var actual  = (document.getElementById('cp-actual')||{}).value||'';
  var nueva   = (document.getElementById('cp-nueva')||{}).value||'';
  var repetir = (document.getElementById('cp-repetir')||{}).value||'';
  var errEl   = document.getElementById('cp-error');

  if(!actual||!nueva||!repetir){ errEl.textContent='Completá todos los campos'; errEl.style.display='block'; return; }
  if(nueva.length < 8){ errEl.textContent='La contraseña debe tener al menos 8 caracteres'; errEl.style.display='block'; return; }
  if(nueva !== repetir){ errEl.textContent='Las contraseñas no coinciden'; errEl.style.display='block'; return; }

  errEl.style.display='none';

  // Re-autenticar y cambiar contraseña con Firebase
  var user = auth.currentUser;
  if(!user){ showAlert('No hay sesión activa'); return; }

  var credential = firebase.auth.EmailAuthProvider.credential(user.email, actual);
  user.reauthenticateWithCredential(credential)
    .then(function(){
      return user.updatePassword(nueva);
    })
    .then(function(){
      closeModal();
      showAlert('✅ Contraseña cambiada correctamente');
    })
    .catch(function(err){
      var msg = 'Error al cambiar la contraseña';
      if(err.code==='auth/wrong-password'||err.code==='auth/invalid-credential') msg='La contraseña actual es incorrecta';
      else if(err.code==='auth/weak-password') msg='La contraseña es muy débil';
      errEl.textContent = msg;
      errEl.style.display = 'block';
    });
}

// ── CLIENTES ─────────────────────────────────────────────────────────
var _clienteEditandoId = null; // ID del cliente siendo editado

function abrirClientes(){
  _clienteEditandoId = null;
  renderClientesModal();
}

function renderClientesModal(){
  var lista = (db.clientesDB||[]).slice().sort(function(a,b){ return a.nombre.localeCompare(b.nombre); });
  var html = '<div class="mtitle">Clientes</div>';
  html += '<div style="display:flex;gap:8px;margin-bottom:12px">';
  html += '<input id="cli-search" placeholder="Buscar cliente..." oninput="filtrarClientes()" style="flex:1;padding:9px 12px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none">';
  html += '<button class="btn btn-primary btn-sm" onclick="abrirFormCliente(null)">+ Nuevo</button>';
  html += '</div>';
  html += '<div id="clientes-list">' + renderClientesList(lista) + '</div>';
  html += '<div class="mfoot"><button class="btn btn-primary" onclick="closeModal()">Cerrar</button></div>';
  showModal(html);
}

function renderClientesList(lista){
  if(!lista||!lista.length) return '<div class="empty">No hay clientes cargados</div>';
  return lista.map(function(c){
    return '<div class="scard" style="margin-bottom:8px;padding:12px">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
      '<div style="flex:1">' +
      '<div style="font-weight:700;font-size:15px">'+escH(c.nombre)+'</div>' +
      (c.telefono?'<div class="scard-meta">📞 '+escH(c.telefono)+'</div>':'')+
      (c.direccion?'<div class="scard-meta">📍 '+escH(c.direccion)+(c.zona?' · '+escH(c.zona):'')+'</div>':'')+
      (c.email?'<div class="scard-meta">✉️ '+escH(c.email)+'</div>':'')+
      (c.cuit?'<div class="scard-meta">CUIT: '+escH(c.cuit)+'</div>':'')+
      (c.notas?'<div class="scard-meta" style="color:var(--text3);font-style:italic">'+escH(c.notas)+'</div>':'')+
      '</div>' +
      '<button class="btn btn-xs" data-cid="'+c.id+'" onclick="abrirFormCliente(this.dataset.cid)">Editar</button>' +
      '</div></div>';
  }).join('');
}

function filtrarClientes(){
  var q = document.getElementById('cli-search').value.toLowerCase();
  var lista = (db.clientesDB||[]).filter(function(c){ return c.nombre.toLowerCase().includes(q); })
    .sort(function(a,b){ return a.nombre.localeCompare(b.nombre); });
  document.getElementById('clientes-list').innerHTML = renderClientesList(lista);
}

function abrirFormCliente(id){
  _clienteEditandoId = id || null;
  var c = _clienteEditandoId ? (db.clientesDB||[]).find(function(x){ return x.id===_clienteEditandoId; }) : null;
  var html = '<div class="mtitle">'+(c?'Editar cliente':'Nuevo cliente')+'</div>';
  html += '<div class="frow">';
  html += '<div class="field"><label>Nombre *</label><input id="c-nom" value="'+(c?escH(c.nombre||''):'')+'" placeholder="Nombre completo"></div>';
  html += '<div class="field"><label>Teléfono</label><input id="c-tel" value="'+(c?escH(c.telefono||''):'')+'" placeholder="+54 9 11..." type="tel"></div>';
  html += '</div>';
  html += '<div class="frow">';
  html += '<div class="field"><label>Dirección *</label><input id="c-dir" value="'+(c?escH(c.direccion||''):'')+'" placeholder="Calle y número"></div>';
  html += '<div class="field"><label>Zona</label><input id="c-zon" value="'+(c?escH(c.zona||''):'')+'" placeholder="Ej: Olivos"></div>';
  html += '</div>';
  html += '<div class="frow">';
  html += '<div class="field"><label>Email</label><input id="c-email" value="'+(c?escH(c.email||''):'')+'" placeholder="email@ejemplo.com" type="email"></div>';
  html += '<div class="field"><label>CUIT</label><input id="c-cuit" value="'+(c?escH(c.cuit||''):'')+'" placeholder="20-12345678-9"></div>';
  html += '</div>';
  html += '<div class="field"><label>Notas</label><textarea id="c-notas" placeholder="Observaciones, referencias, equipos...">'+(c?escH(c.notas||''):'')+'</textarea></div>';
  if(c){
    // Botón de equipos del cliente
    html += '<div style="margin-top:4px;margin-bottom:12px"><button class="btn btn-sm" onclick="abrirEquiposCliente(\''+escH(c.nombre)+'\')">🔧 Ver equipos</button></div>';
    var svcs = db.servicios.filter(function(s){ return s.cliente===c.nombre; });
    if(svcs.length){
      html += '<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">';
      html += '<div style="font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px">HISTORIAL ('+svcs.length+' servicios)</div>';
      html += svcs.slice(0,5).map(function(s){
        return '<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--text2)">'+
          fmtDate(s.fecha)+' · '+escH(s.tipo)+
          ' · <span style="color:'+(s.facturado?'var(--green-text)':'var(--yellow-text)')+'">$ '+fmt(calcFin(s).totalCliente)+'</span></div>';
      }).join('');
      if(svcs.length>5) html+='<div style="font-size:11px;color:var(--text3);padding-top:4px">y '+(svcs.length-5)+' más...</div>';
      html += '</div>';
    }
  }
  html += '<div class="mfoot">';
  if(c) html += '<button class="btn btn-danger btn-sm" onclick="eliminarCliente()">Eliminar</button>';
  html += '<button class="btn" onclick="closeModal();renderClientesModal()">Cancelar</button>';
  html += '<button class="btn btn-primary" onclick="guardarCliente()">Guardar</button>';
  html += '</div>';
  showModal(html);
}

function guardarCliente(){
  var nom = document.getElementById('c-nom').value.trim();
  var dir = document.getElementById('c-dir').value.trim();
  if(!nom){ showAlert('Ingresá un nombre'); return; }
  if(!dir){ showAlert('La dirección es obligatoria'); return; }
  var data = {
    nombre:    nom,
    telefono:  document.getElementById('c-tel').value.trim(),
    direccion: document.getElementById('c-dir').value.trim(),
    zona:      document.getElementById('c-zon').value.trim(),
    email:     document.getElementById('c-email').value.trim(),
    cuit:      document.getElementById('c-cuit').value.trim(),
    notas:     document.getElementById('c-notas').value.trim()
  };
  if(!db.clientesDB) db.clientesDB = [];
  if(_clienteEditandoId){
    var c = db.clientesDB.find(function(x){ return x.id===_clienteEditandoId; });
    if(c){ Object.assign(c, data); }
    else { data.id=_clienteEditandoId; db.clientesDB.push(data); }
  } else {
    data.id = 'cli_'+(db.nextClienteId||1);
    db.nextClienteId = (db.nextClienteId||1) + 1;
    db.clientesDB.push(data);
  }
  saveDB();
  _clienteEditandoId = null;
  closeModal();
  renderClientesModal();
}

function eliminarCliente(){
  showConfirm('¿Eliminar este cliente?', function(){
    if(!_clienteEditandoId) return;
    db.clientesDB = (db.clientesDB||[]).filter(function(c){ return c.id!==_clienteEditandoId; });
    saveDB();
    _clienteEditandoId = null;
    closeModal();
    renderClientesModal();
  });
}

// Mantener compatibilidad con funciones antiguas
function openClienteModal(id){ abrirFormCliente(id); }
function saveCliente(id){ guardarCliente(); }
function saveClienteById(id){ guardarCliente(); }
function deleteCliente(id){ _clienteEditandoId=id; eliminarCliente(); }


function buscarClienteDB(){
  var inp = document.getElementById('m-cl');
  var lst = document.getElementById('m-cl-list');
  if(!inp||!lst) return;
  var v = inp.value.trim().toLowerCase();
  if(!v){ lst.style.display='none'; return; }
  var matches = db.clientesDB.filter(function(c){ return c.nombre.toLowerCase().includes(v); }).slice(0,6);
  var html = matches.map(function(c){
    return '<div class="aci" onmousedown="autocompletarCliente(\'' + c.id + '\')">' +
      '<div style="font-weight:600">'+escH(c.nombre)+'</div>' +
      (c.telefono||c.direccion?'<div style="font-size:11px;color:var(--text3)">'+(c.telefono||'')+(c.telefono&&c.direccion?' · ':'')+(c.direccion||'')+'</div>':'') +
      '</div>';
  }).join('');
  window._nombreClientePrevio = inp.value.trim();
  html += '<div class="aci" onmousedown="nuevoClienteDesdeModal()" style="border-top:1px solid var(--border);color:var(--green-text);font-weight:600;background:var(--green-light)">' +
    '+ ' + (matches.length ? 'Cargar nuevo cliente' : 'No encontrado · Cargar nuevo cliente') +
    '</div>';
  lst.innerHTML = html;
  lst.style.display = 'block';
}

function nuevoClienteDesdeModal(){
  var nombrePrevio = window._nombreClientePrevio || '';
  var lst = document.getElementById('m-cl-list');
  if(lst) lst.style.display='none';
  var html = '<div class="mtitle">Nuevo cliente</div>';
  html += '<div class="frow">';
  html += '<div class="field"><label>Nombre *</label><input id="nc-nom" value="'+escH(nombrePrevio)+'" placeholder="Nombre completo"></div>';
  html += '<div class="field"><label>Teléfono</label><input id="nc-tel" value="" placeholder="+54 9 11..." type="tel"></div>';
  html += '</div>';
  html += '<div class="frow">';
  html += '<div class="field"><label>Dirección</label><input id="nc-dir" value="" placeholder="Calle y número"></div>';
  html += '<div class="field"><label>Zona</label><input id="nc-zon" value="" placeholder="Ej: Olivos"></div>';
  html += '</div>';
  html += '<div class="frow">';
  html += '<div class="field"><label>Email</label><input id="nc-email" value="" placeholder="email@ejemplo.com" type="email"></div>';
  html += '<div class="field"><label>CUIT</label><input id="nc-cuit" value="" placeholder="20-12345678-9"></div>';
  html += '</div>';
  html += '<div class="field"><label>Notas</label><textarea id="nc-notas" placeholder="Observaciones, referencias, equipos..."></textarea></div>';
  html += '<div class="mfoot">';
  html += '<button class="btn" onclick="closeModal();setTimeout(function(){ openServiceModal(window._editingServiceId); },50)">Cancelar</button>';
  html += '<button class="btn btn-primary" onclick="guardarClienteYVolver()">Guardar y continuar</button>';
  html += '</div>';
  showModal(html);
  setTimeout(function(){ var el=document.getElementById('nc-nom'); if(el){el.focus();el.select();} }, 100);
}

function guardarClienteYVolver(){
  var nom = document.getElementById('nc-nom').value.trim();
  if(!nom){ showAlert('Ingresá un nombre'); return; }
  var data = {
    id:        'cli_'+(db.nextClienteId++),
    nombre:    nom,
    telefono:  document.getElementById('nc-tel').value.trim(),
    direccion: document.getElementById('nc-dir').value.trim(),
    zona:      document.getElementById('nc-zon').value.trim(),
    email:     document.getElementById('nc-email').value.trim(),
    cuit:      document.getElementById('nc-cuit').value.trim(),
    notas:     document.getElementById('nc-notas').value.trim(),
  };
  db.clientesDB.push(data);
  saveDB();
  closeModal();
  var sid = window._editingServiceId;
  setTimeout(function(){
    openServiceModal(sid);
    setTimeout(function(){
      var set = function(id,val){ var el=document.getElementById(id); if(el) el.value=val||''; };
      set('m-cl',   data.nombre);
      set('m-tel',  data.telefono);
      set('m-dir',  data.direccion);
      set('m-zona', data.zona);
      updateMapsLink();
    }, 150);
  }, 50);
}

function actualizarSelectorEquipo(){
  var inp = document.getElementById('m-cl');
  var sel = document.getElementById('m-equipo');
  if(!inp||!sel) return;
  var nombre = inp.value.trim();
  var eqs = (db.equiposDB||[]).filter(function(e){ return e.cliente===nombre; });
  sel.innerHTML = '<option value="">-- Sin equipo --</option>';
  eqs.forEach(function(eq){
    var opt = document.createElement('option');
    opt.value = eq.id;
    var parts = [];
    if(eq.serie) parts.push(eq.serie);
    if(eq.modelo) parts.push(eq.modelo);
    if(eq.ubicacion) parts.push(eq.ubicacion);
    if(eq.marca) parts.push(eq.marca);
    opt.textContent = parts.join(' · ');
    sel.appendChild(opt);
  });
  var optNuevo = document.createElement('option');
  optNuevo.value = '__nuevo__';
  optNuevo.textContent = '── + Agregar equipo nuevo ──';
  sel.appendChild(optNuevo);
  sel.onchange = function(){ if(this.value==='__nuevo__'){ this.value=''; nuevoEquipoDesdeModal(); } };
}

function autocompletarCliente(id){
  const c = db.clientesDB.find(x=>x.id===id);
  if(!c) return;
  const set = (elId, val)=>{ const el=document.getElementById(elId); if(el) el.value=val||''; };
  set('m-cl', c.nombre);
  set('m-tel', c.telefono);
  set('m-dir', c.direccion);
  set('m-zona', c.zona);
  const lst = document.getElementById('m-cl-list');
  if(lst) lst.style.display='none';
  setTimeout(updateMapsLink, 50);
  // Actualizar equipos del cliente seleccionado
  setTimeout(actualizarSelectorEquipo, 80);
}

function setupAC(inputId, listId, srcFn){
  const inp = document.getElementById(inputId);
  const lst = document.getElementById(listId);
  if(!inp || !lst) return;
  inp.addEventListener('input', ()=>{
    const v = inp.value.trim().toLowerCase();
    const m = srcFn().filter(s=>s && s.toLowerCase().includes(v) && s.toLowerCase()!==v).slice(0,6);
    if(!m.length || !v){ lst.style.display='none'; return; }
    lst.innerHTML = m.map(s=>'<div class="aci" onmousedown="pickAC(\''+inputId+'\',\''+listId+'\',this)">'+s+'</div>').join('');
    lst.style.display = 'block';
  });
  inp.addEventListener('blur', ()=>setTimeout(()=>{ lst.style.display='none'; }, 180));
}
function pickAC(iid, lid, el){
  document.getElementById(iid).value = el.textContent;
  document.getElementById(lid).style.display = 'none';
}

// ── GOOGLE MAPS ──────────────────────────────────────────────────────
function updateMapsLink(){
  const dir  = (document.getElementById('m-dir')||{}).value  || '';
  const zona = (document.getElementById('m-zona')||{}).value || '';
  const link = document.getElementById('maps-link');
  if(!link) return;
  if(dir.trim()){
    link.href = mapsUrl(dir, zona);
    link.style.opacity = '1';
    link.style.pointerEvents = 'auto';
  } else {
    link.href = '#';
    link.style.opacity = '0.3';
    link.style.pointerEvents = 'none';
  }
}
function mapsUrl(dir, zona){
  const q = encodeURIComponent((dir||'') + (zona ? ', '+zona : ''));
  return 'https://www.google.com/maps/search/?api=1&query='+q;
}
function mapsIcon(dir, zona){
  if(!dir) return '';
  return '<a href="'+mapsUrl(dir,zona)+'" target="_blank" title="Abrir en Maps" '+
    'style="display:inline-flex;align-items:center;margin-left:6px;color:var(--blue);text-decoration:none;flex-shrink:0" '+
    'onclick="event.stopPropagation()">'+
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">'+
    '<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></a>';
}

function renderPendList(){
  // Alerta equipos con mantenimiento vencido o próximo
  var vencidos = equiposVencidos();
  if(vencidos.length){
    var hoy = new Date(); hoy.setHours(0,0,0,0);
    var alertaEl = document.createElement('div');
    alertaEl.className = 'alert aw';
    alertaEl.style.cursor = 'pointer';
    alertaEl.onclick = function(){ toggleMenu(); setTimeout(abrirEquipos,50); };
    var venc = vencidos.filter(function(e){ var d=new Date(e.proximoServicio); d.setHours(0,0,0,0); return d<hoy; }).length;
    var prox = vencidos.length - venc;
    var msg = '🔧 ';
    if(venc) msg += venc+' equipo'+(venc>1?'s':'')+' con mantenimiento vencido';
    if(venc && prox) msg += ' · ';
    if(prox) msg += prox+' equipo'+(prox>1?'s':'')+' con servicio próximo';
    msg += ' — Tocar para ver';
    alertaEl.textContent = msg;
    var pendEl = document.getElementById('pend-list');
    if(pendEl) pendEl.parentNode.insertBefore(alertaEl, pendEl);
  }
  const svcs = getVisible().filter(s=>!s.facturado).sort((a,b)=>a.fecha>b.fecha?1:-1);
  const el = document.getElementById('pend-list');
  if(!el) return;
  if(!svcs.length){ el.innerHTML='<div class="empty">No hay pedidos pendientes</div>'; return; }
  el.innerHTML = svcs.map(s=>{
    const f = calcFin(s);
    const tecs = db.tecnicos.filter(t=>s.tecnicos&&s.tecnicos.includes(t.id)).map(t=>t.nombre).join(', ');
    const bc = s.estado==='En proceso' ? 'bpr' : 'bp';

    return '<div class="scard" onclick="openServiceModal('+s.id+')" style="cursor:pointer">' +

      '<span class="badge '+bc+'">'+est+'</span></div>' +
      '<div class="scard-meta" style="display:flex;align-items:center;gap:2px">📍 '+escH(s.direccion||'')+(s.zona?' · '+escH(s.zona):'')+mapsIcon(s.direccion,s.zona)+'</div>' +
      '<div class="scard-meta">'+(s.fecha?'📅 '+fmtDate(s.fecha)+' ':'')+( s.hora?'⏰ '+s.hora:'')+'</div>' +
      '<div class="scard-meta">'+(tecs?'👷 '+tecs:'Sin técnico')+'</div>' +
      (f.totalCliente?'<div style="font-size:13px;color:var(--text2);margin-top:4px">Total cliente: <strong style="color:#fbbf24">$ '+fmt(f.totalCliente)+'</strong></div>':'')+

      html += '<div style="font-weight:600;margin-bottom:4px">🔧 '+escH([eq.tipo,eq.marca,eq.modelo].filter(Boolean).join(' '))+'</div>';
      if(eq.serie)    html += '<div style="color:var(--text2)">N° serie: <span style="color:var(--text)">'+escH(eq.serie)+'</span></div>';
      if(eq.ubicacion)html += '<div style="color:var(--text2)">Ubicación: <span style="color:var(--text)">'+escH(eq.ubicacion)+'</span></div>';
      if(eq.capacidad)html += '<div style="color:var(--text2)">Capacidad: <span style="color:var(--text)">'+escH(eq.capacidad)+'</span></div>';
      if(eq.gas)      html += '<div style="color:var(--text2)">Gas: <span style="color:var(--text)">'+escH(eq.gas)+'</span></div>';
      html += '</div></div>';
    }
  }

  html += '<hr style="border:none;border-top:1px solid var(--border);margin:14px 0">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  html += '<div style="font-size:13px;font-weight:600;color:var(--text2)">Ítems del servicio</div>';
  html += '<div class="leg"><div class="li"><div class="ld" style="background:var(--green)"></div>Ingreso</div><div class="li"><div class="ld" style="background:var(--blue)"></div>Costo</div><div class="li"><div class="ld" style="background:var(--red)"></div>Gasto</div></div>';
  html += '</div>';

  // items en mismo layout que editar pero sin botones de borrar/cambiar tipo
  if(s.items && s.items.length){
    html += '<div class="ihead"><span>Cant.</span><span>Descripción</span><span>Importe $</span><span>Tipo</span></div>';
    html += s.items.map(item=>{
      const cls = item.tipo==='ingreso'?'ingreso':item.tipo==='costo'?'costo':'gasto';
      return '<div class="irow" style="grid-template-columns:40px 1fr 76px 68px">' +
        '<input type="number" value="'+(item.qty||1)+'" '+dis+'>' +
        '<input value="'+escH(item.desc||'')+'" '+dis+'>' +
        '<input type="number" value="'+(item.importe||'')+'" '+dis+'>' +
        '<button class="tbtn '+cls+'" '+dis+' data-tipo="'+(item.tipo||'ingreso')+'" style="opacity:1">'+ucFirst(item.tipo||'ingreso')+'</button>' +
        '</div>';
    }).join('');
  }

  // resumen financiero
  const sum = tipo => (s.items||[]).filter(i=>i.tipo===tipo).reduce((a,i)=>a+Number(i.importe||0)*Number(i.qty||1),0);
  const ing=sum('ingreso'), cos=sum('costo'), gas=sum('gasto');
  const totC=ing+cos, base=ing-gas;
  const tecs = db.tecnicos.filter(t=>s.tecnicos&&s.tecnicos.includes(t.id));

  // Total destacado
  html +=
    '<div style="margin-top:8px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center">' +
      '<span style="font-size:17px;font-weight:700;color:var(--text)">Total</span>' +
      '<span style="font-size:20px;font-weight:800;color:var(--text)">$ '+fmt(totC)+'</span>' +
    '</div>';
  // Desglose interno
  html += '<div class="resumen" style="margin-top:10px">' +
    '<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Desglose interno</div>' +
    '<div class="rrow"><span style="color:var(--green-text)">▶ Ingresos (mano de obra)</span><span style="color:var(--green-text);font-weight:600">$ '+fmt(ing)+'</span></div>' +
    '<div class="rrow"><span style="color:var(--blue-text)">▶ Costos (materiales)</span><span style="color:var(--blue-text);font-weight:600">$ '+fmt(cos)+'</span></div>' +
    '<div class="rrow"><span style="color:var(--red-text)">▼ Gastos operativos</span><span style="color:var(--red-text);font-weight:600">− $ '+fmt(gas)+'</span></div>' +
    '<div class="rrow tot" style="border-top:none;margin-top:4px;padding-top:4px"><span>Base a repartir</span><span style="color:var(--green)">$ '+fmt(base)+'</span></div>' +
    (tecs.length ?
      '<div style="border-top:1px solid var(--border2);margin-top:10px;padding-top:8px">' +
        '<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Reparto por técnico</div>' +
        tecs.map(function(t){ return '<div style="display:flex;align-items:center;gap:8px;margin-top:6px"><span style="min-width:52px;font-size:13px;font-weight:500;color:var(--green-text)">'+escH(t.nombre)+'</span>' +
          '<input type="number" value="'+(f.rMap[t.id]||0)+'" '+dis+' style="flex:1;padding:6px 10px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none;opacity:.7;cursor:default"></div>'; }).join('') +
      '</div>' : '') +
    '</div>';

  html += '<div class="mfoot"><button class="btn btn-primary" onclick="closeModal()">Cerrar</button></div>';
  showModal(html);
}

// ── AGENDA ────────────────────────────────────────────────────────────
let calY = new Date().getFullYear(), calM = new Date().getMonth();
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS  = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];
function renderAgenda(){
  document.getElementById('page-agenda').innerHTML =
    '<div class="page-header"><div class="page-title">Agenda</div></div>' +
    '<div class="cal-nav"><button class="btn btn-sm" onclick="changeMonth(-1)">&#8592;</button>' +
    '<span class="cal-month" id="cal-label"></span>' +
    '<button class="btn btn-sm" onclick="changeMonth(1)">&#8594;</button></div>' +
    '<div id="cal-grid-wrap"></div>' +
    '<div id="cal-day-detail" style="margin-top:14px"></div>';
  renderCal();
}
function changeMonth(d){ calM+=d; if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;} renderCal(); }
function calDayColor(cnt){
  if(cnt===0) return '';
  if(cnt===1) return 'background:#16a34a;border-color:#16a34a;';
  if(cnt===2) return 'background:#d97706;border-color:#d97706;';
  return 'background:#dc2626;border-color:#dc2626;';
}
function renderCal(){
  document.getElementById('cal-label').textContent = MESES[calM]+' '+calY;
  const first = new Date(calY,calM,1).getDay();
  const days  = new Date(calY,calM+1,0).getDate();
  const today = todayStr();
  const svcs  = getVisible().filter(s=>!s.facturado && s.fecha && s.fecha.startsWith(calY+'-'+String(calM+1).padStart(2,'0')));
  const byDay = {};
  svcs.forEach(s=>{ const d=Number(s.fecha.split('-')[2]); byDay[d]=(byDay[d]||[]); byDay[d].push(s); });
  let html = '<div class="cal-grid">';
  DIAS.forEach(d=>html+='<div class="cal-dname">'+d+'</div>');
  for(let i=0;i<first;i++) html+='<div class="cal-day other"></div>';
  for(let d=1;d<=days;d++){
    const ds = calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = ds===today;
    const daySvcs = byDay[d] || [];
    const cnt = daySvcs.length;
    const colorStyle = calDayColor(cnt);
    const textColor  = cnt>0 ? 'color:#fff;' : '';
    const todayRing  = isToday && cnt===0 ? 'border-color:var(--blue);background:var(--blue);' : '';
    const clientes   = daySvcs.slice(0,2).map(s=>escH(s.cliente)).join(', ') + (daySvcs.length>2?'…':'');

    html+='<div class="cal-day" style="'+colorStyle+todayRing+'cursor:pointer;min-height:54px" onclick="showDayDetail('+d+')">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div class="cal-dnum" style="'+(isToday?'color:#fff;font-weight:800;':textColor+'font-weight:700;')+'">'+d+'</div>' +
        (cnt?'<div style="'+textColor+'font-size:10px;font-weight:800;background:rgba(0,0,0,.18);border-radius:8px;padding:1px 5px">'+cnt+'</div>':'') +
      '</div>' +
      (cnt?'<div style="'+textColor+'font-size:9px;font-weight:600;margin-top:3px;line-height:1.3;overflow:hidden;max-height:28px">'+clientes+'</div>':'') +
    '</div>';
  }
  html+='</div>';

  // leyenda
  html += '<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">' +
    '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)"><div style="width:12px;height:12px;border-radius:3px;background:#16a34a"></div>1 servicio</div>' +
    '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)"><div style="width:12px;height:12px;border-radius:3px;background:#d97706"></div>2 servicios</div>' +
    '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)"><div style="width:12px;height:12px;border-radius:3px;background:#dc2626"></div>3 o más</div>' +
  '</div>';

  document.getElementById('cal-grid-wrap').innerHTML=html;
  document.getElementById('cal-day-detail').innerHTML='';
}
function showDayDetail(d){
  const ds = calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  const svcs = getVisible().filter(s=>s.fecha===ds && !s.facturado);
  const el = document.getElementById('cal-day-detail');
  // Header con fecha y botón nuevo pedido
  var header = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
    '<div style="font-size:14px;font-weight:700;color:var(--text)">'+fmtDate(ds)+'</div>' +
    '<button class="btn btn-primary btn-sm" onclick="nuevoPedidoDesdeAgenda(\''+ds+'\')">+ Nuevo pedido</button>' +
    '</div>';
  if(!svcs.length){
    el.innerHTML = header + '<div class="scard" style="color:var(--text3);font-size:13px;text-align:center;padding:16px">Sin servicios este día</div>';
    return;
  }
  el.innerHTML = header + svcs.map(s=>{
    const tecs = db.tecnicos.filter(t=>s.tecnicos&&s.tecnicos.includes(t.id)).map(t=>t.nombre).join(', ');
    const bc = s.estado==='En proceso' ? 'bpr' : 'bp';
    return '<div class="scard" style="margin-bottom:8px;cursor:pointer" onclick="openServiceModal('+s.id+')">' +
      '<div class="scard-head"><div>' +
        '<div class="scard-name">'+escH(s.cliente)+'</div>' +
        '<div class="scard-meta">'+escH(s.tipo)+(s.zona?' · '+escH(s.zona):'')+'</div>' +
      '</div><span class="badge '+bc+'">'+(s.estado||'Pendiente')+'</span></div>' +
      (s.hora?'<div class="scard-meta">⏰ '+s.hora+'</div>':'')+
      (tecs?'<div class="scard-meta">👷 '+tecs+'</div>':'')+
      '</div>';
  }).join('');
}

// ── ESTADÍSTICAS ──────────────────────────────────────────────────────
var _statDesde = null;
var _statHasta = null;

function setStatFechas(){
  var d = document.getElementById('stat-desde');
  var h = document.getElementById('stat-hasta');
  if(d) _statDesde = d.value;
  if(h) _statHasta = h.value;
  renderEstadisticas();
}

function setStatRango(desde, hasta){
  _statDesde = desde;
  _statHasta = hasta;
  renderEstadisticas();
}

function renderEstadisticas(){
  const el = document.getElementById('page-estadisticas');
  const hoy = new Date();
  const hoyStr = hoy.toISOString().split('T')[0];
  const primerDiaMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1).toISOString().split('T')[0];
  if(!_statDesde) _statDesde = primerDiaMes;
  if(!_statHasta) _statHasta = hoyStr;

  let header = '<div class="page-header"><div class="page-title">Estadísticas</div>';
  if(isAdmin()) header += '<button class="btn btn-sm" onclick="exportarExcel()">📊 Excel</button>';
  header += '</div>';
  header += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px">';
  header += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">';
  header += '<div style="display:flex;align-items:center;gap:6px">';
  header += '<label style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap">Desde</label>';
  header += '<input type="date" id="stat-desde" value="'+_statDesde+'" onchange="setStatFechas()" style="padding:6px 10px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;outline:none">';
  header += '</div>';
  header += '<div style="display:flex;align-items:center;gap:6px">';
  header += '<label style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap">Hasta</label>';
  header += '<input type="date" id="stat-hasta" value="'+_statHasta+'" onchange="setStatFechas()" style="padding:6px 10px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;outline:none">';
  header += '</div>';
  header += '</div>';
  header += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  const semLunes = (()=>{ const l=new Date(hoy); l.setDate(hoy.getDate()-((hoy.getDay()+6)%7)); return l.toISOString().split("T")[0]; })();
  const iniAnio = hoy.getFullYear()+'-01-01';
  const rangos = [
    {l:'Hoy',          d:hoyStr,      h:hoyStr},
    {l:'Esta semana',  d:semLunes,    h:hoyStr},
    {l:'Este mes',     d:primerDiaMes,h:hoyStr},
    {l:'Este año',     d:iniAnio,     h:hoyStr},
    {l:'Todo',         d:'2000-01-01',h:hoyStr},
  ];
  rangos.forEach(function(r){
    var activo = _statDesde===r.d && _statHasta===r.h;
    var bg = activo ? 'var(--blue)' : 'var(--surface2)';
    var col = activo ? '#fff' : 'var(--text2)';
    header += '<button data-d="'+r.d+'" data-h="'+r.h+'" onclick="setStatRango(this.dataset.d,this.dataset.h)" style="padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border2);cursor:pointer;background:'+bg+';color:'+col+'">'+r.l+'</button>';
  });
  header += '</div></div>';

  // Filtrar servicios por rango de fechas
  const svcsAll = db.servicios.filter(s=>s.facturado);
  const svcs = svcsAll.filter(s=>{
    if(!s.fecha) return false;
    return s.fecha >= _statDesde && s.fecha <= _statHasta;
  });
  const svcsFiltrados = isAdmin() ? svcs : svcs.filter(s=>s.tecnicos&&s.tecnicos.includes(currentUser));

  if(!svcsFiltrados.length){
    el.innerHTML = header + '<div class="empty">Sin datos para el período seleccionado</div>';
    return;
  }

  const T = svcsFiltrados.reduce((acc,s)=>{
    const f=calcFin(s);
    acc.ing+=f.ingresos; acc.cos+=f.costos; acc.gas+=f.gastos;
    acc.tc+=f.totalCliente; acc.base+=f.baseReparto;
    return acc;
  },{ing:0,cos:0,gas:0,tc:0,base:0});
  const avg = svcsFiltrados.length ? T.tc/svcsFiltrados.length : 0;

  let tecHtml = '';
  if(db.tecnicos.length){
    let tecIds = isAdmin()
      ? db.tecnicos.map(t=>t.id)
      : [...new Set(svcsAll.filter(s=>s.tecnicos&&s.tecnicos.includes(currentUser)).flatMap(s=>s.tecnicos||[]))];

    const tecStats = tecIds.map(tid=>{
      const t = db.tecnicos.find(x=>x.id===tid);
      if(!t) return null;
      const trabajos = isAdmin()
        ? svcs.filter(s=>s.tecnicos&&s.tecnicos.includes(tid))
        : svcs.filter(s=>s.tecnicos&&s.tecnicos.includes(tid)&&s.tecnicos.includes(currentUser));
      const cobrado = trabajos.reduce((a,s)=>a+(calcFin(s).rMap[tid]||0),0);
      return {t, trabajos:trabajos.length, cobrado};
    }).filter(x=>x&&x.trabajos>0).sort((a,b)=>b.cobrado-a.cobrado);

    if(tecStats.length){
      tecHtml = '<div style="margin-top:4px">' +
        '<div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px">Cobro por técnico</div>' +
        '<div class="scard" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr>' +
        '<th>Técnico</th><th>Trabajos</th><th>Total cobrado</th><th>Promedio</th></tr></thead><tbody>' +
        tecStats.map(function(x){
          const prom = x.trabajos ? x.cobrado/x.trabajos : 0;
          return '<tr><td style="font-weight:600">'+escH(x.t.nombre)+'</td><td>'+x.trabajos+'</td>' +
            '<td style="color:var(--green-text);font-weight:700">$ '+fmt(x.cobrado)+'</td>' +
            '<td style="color:var(--text2)">$ '+fmt(prom)+'</td></tr>';
        }).join('') +
        '</tbody></table></div></div>';
    }
  }

  el.innerHTML = header +
    '<div class="stat-grid">' +
    '<div class="sc full"><div class="slabel">Total cobrado a clientes</div><div class="sval" style="color:#fbbf24">$ '+fmt(T.tc)+'</div></div>' +
    '<div class="sc"><div class="slabel">Ingresos (m. obra)</div><div class="sval" style="color:var(--green)">$ '+fmt(T.ing)+'</div></div>' +
    '<div class="sc"><div class="slabel">Materiales (costos)</div><div class="sval" style="color:#7dd3fc">$ '+fmt(T.cos)+'</div></div>' +
    '<div class="sc"><div class="slabel">Gastos operativos</div><div class="sval" style="color:#fca5a5">$ '+fmt(T.gas)+'</div></div>' +
    '<div class="sc"><div class="slabel">Base a repartir</div><div class="sval" style="color:var(--green)">$ '+fmt(T.base)+'</div></div>' +
    '<div class="sc"><div class="slabel">Trabajos facturados</div><div class="sval">'+svcsFiltrados.length+'</div></div>' +
    '<div class="sc"><div class="slabel">Promedio por trabajo</div><div class="sval">$ '+fmt(avg)+'</div></div>' +
    '</div>' + tecHtml;
}


// ── EXPORTAR EXCEL ────────────────────────────────────────────────────
function exportarExcel(){
  const hoy = new Date();
  const svcsAll = db.servicios.filter(s=>s.facturado);
  const svcs = svcsAll.filter(s=>s.fecha && s.fecha>=(_statDesde||'2000-01-01') && s.fecha<=(_statHasta||hoy.toISOString().split('T')[0]));
  const periodoLabel = (_statDesde||'') + '_' + (_statHasta||'');
  const fmtN = n => Math.round(Number(n||0));

  // Construir CSV con múltiples secciones
  let csv = '\uFEFF'; // BOM para Excel

  // ── RESUMEN GENERAL ──
  const T = svcs.reduce((acc,s)=>{ const f=calcFin(s); acc.ing+=f.ingresos; acc.cos+=f.costos; acc.gas+=f.gastos; acc.tc+=f.totalCliente; acc.base+=f.baseReparto; return acc; },{ing:0,cos:0,gas:0,tc:0,base:0});
  csv += 'RESUMEN GENERAL - '+periodoLabel+'\n';
  csv += 'Concepto;Importe\n';
  csv += 'Total cobrado a clientes;'+fmtN(T.tc)+'\n';
  csv += 'Ingresos (mano de obra);'+fmtN(T.ing)+'\n';
  csv += 'Materiales (costos);'+fmtN(T.cos)+'\n';
  csv += 'Gastos operativos;'+fmtN(T.gas)+'\n';
  csv += 'Base a repartir;'+fmtN(T.base)+'\n';
  csv += 'Trabajos facturados;'+svcs.length+'\n';
  csv += 'Promedio por trabajo;'+fmtN(svcs.length?T.tc/svcs.length:0)+'\n';
  csv += '\n';

  // ── DETALLE POR TÉCNICO ──
  csv += 'DETALLE POR TÉCNICO\n';
  csv += 'Técnico;Trabajos;Total cobrado;Promedio por trabajo\n';
  db.tecnicos.forEach(t=>{
    const trabajos = svcs.filter(s=>s.tecnicos&&s.tecnicos.includes(t.id));
    const cobrado = trabajos.reduce((a,s)=>a+(calcFin(s).rMap[t.id]||0),0);
    if(trabajos.length) csv += escCSV(t.nombre)+';'+trabajos.length+';'+fmtN(cobrado)+';'+fmtN(trabajos.length?cobrado/trabajos.length:0)+'\n';
  });
  csv += '\n';

  // ── DETALLE POR CLIENTE ──
  csv += 'DETALLE POR CLIENTE\n';
  csv += 'Cliente;Dirección;Trabajos;Total facturado\n';
  const porCliente = {};
  svcs.forEach(s=>{
    const k = s.cliente||'Sin nombre';
    if(!porCliente[k]) porCliente[k]={cliente:k,direccion:s.direccion||'',trabajos:0,total:0};
    porCliente[k].trabajos++;
    porCliente[k].total += calcFin(s).totalCliente;
  });
  Object.values(porCliente).sort((a,b)=>b.total-a.total).forEach(c=>{
    csv += escCSV(c.cliente)+';'+escCSV(c.direccion)+';'+c.trabajos+';'+fmtN(c.total)+'\n';
  });
  csv += '\n';

  // ── DETALLE DE SERVICIOS ──
  csv += 'DETALLE DE SERVICIOS\n';
  csv += 'Fecha;Cliente;Dirección;Tipo;Técnicos;Ingresos;Costos;Gastos;Total cliente\n';
  svcs.sort((a,b)=>b.id-a.id).forEach(s=>{
    const f = calcFin(s);
    const tecs = db.tecnicos.filter(t=>s.tecnicos&&s.tecnicos.includes(t.id)).map(t=>t.nombre).join(' / ');
    csv += escCSV(fmtDate(s.fecha))+';'+escCSV(s.cliente)+';'+escCSV(s.direccion||'')+';'+escCSV(s.tipo||'')+';'+escCSV(tecs)+';'+fmtN(f.ingresos)+';'+fmtN(f.costos)+';'+fmtN(f.gastos)+';'+fmtN(f.totalCliente)+'\n';
  });

  // Descargar
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'estadisticas-md-'+periodoLabel.toLowerCase().replace(/ /g,'_')+'-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function escCSV(v){
  v = String(v||'');
  if(v.includes(';')||v.includes('"')||v.includes('\n')) return '"'+v.replace(/"/g,'""')+'"';
  return v;
}

function showConfirm(msg, onOk){
  const ov = document.createElement('div');
  ov.className = 'modal-ov';
  ov.style.zIndex = '999';
  ov.innerHTML = `
    <div class="modal" style="max-height:auto;padding:24px 20px">

        <button class="btn btn-primary" id="conf-ok">Aceptar</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  document.getElementById('conf-cancel').onclick = () => ov.remove();
  document.getElementById('conf-ok').onclick = () => { ov.remove(); onOk(); };
}
