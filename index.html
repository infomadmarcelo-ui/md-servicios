// ── ITEMS ────────────────────────────────────────────────────────────
function addItem(){
  syncItems();
  modalItems.push({qty:1,desc:'',importe:'',tipo:'ingreso'});
  renderItemsList();
  // Foco en el campo descripción del último ítem agregado
  const i = modalItems.length - 1;
  setTimeout(()=>{ const el=document.getElementById('idd-'+i); if(el) el.focus(); }, 50);
}
function removeItem(i){ syncItems(); modalItems.splice(i,1); if(!modalItems.length) modalItems.push({qty:1,desc:'',importe:'',tipo:'ingreso'}); renderItemsList(); }
function cycleType(i){
  syncItems();
  const T=['ingreso','costo','gasto'];
  modalItems[i].tipo = T[(T.indexOf(modalItems[i].tipo||'ingreso')+1)%3];
  if(modalItems[i].tipo !== 'costo') modalItems[i].adelantos = {};
  const rows = document.querySelectorAll('.irow');
  if(rows[i]){
    const btn = rows[i].querySelector('.tbtn');
    if(btn){
      btn.dataset.tipo = modalItems[i].tipo;
      btn.className = 'tbtn '+modalItems[i].tipo;
      btn.textContent = modalItems[i].tipo.charAt(0).toUpperCase()+modalItems[i].tipo.slice(1);
    }
    renderAdelantoRow(i, rows[i]);
  }
  updateResumen();
}

function renderAdelantoRow(i, rowEl){
  var existing = rowEl.parentNode.querySelector('#adelanto-row-'+i);
  var tipo = modalItems[i].tipo;
  if(tipo !== 'costo'){
    if(existing) existing.remove();
    return;
  }
  var selTecs = [...document.querySelectorAll('#chips-tec .chip.sel')].map(c=>c.dataset.tid);
  if(!selTecs.length){ if(existing) existing.remove(); return; }
  var adelantos = modalItems[i].adelantos || {};
  var totalItem = Number(modalItems[i].importe||0) * Number(modalItems[i].qty||1);
  var totalAdelantado = selTecs.reduce(function(a,id){ return a + Number(adelantos[id]||0); }, 0);
  var diferencia = totalItem - totalAdelantado;
  var estadoColor = Math.abs(diferencia) < 1 ? 'var(--green-text)' : 'var(--yellow-text)';
  var estadoTxt = Math.abs(diferencia) < 1 ? '\u2705 Completo' : ('Faltan $ '+fmt(Math.abs(diferencia)));
  var tecInputs = selTecs.map(function(id){
    var t = db.tecnicos.find(function(x){ return x.id===id; });
    var nombre = t ? t.nombre : id;
    var val = adelantos[id] || '';
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
      '<span style="min-width:72px;font-size:12px;font-weight:600;color:var(--text2)">'+nombre+'</span>' +
      '<input type="number" min="0" value="'+val+'" placeholder="0" ' +
      'style="flex:1;padding:5px 8px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px" ' +
      'oninput="onAdelantoInput('+i+',\''+id+'\',this.value)">' +
    '</div>';
  }).join('');
  var html = '<div id="adelanto-row-'+i+'" style="margin:-2px 0 8px 0;padding:10px 12px;background:var(--blue-light);border:1.5px solid var(--border2);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm)">' +
    '<div style="font-size:11px;font-weight:700;color:var(--blue-text);letter-spacing:.4px;margin-bottom:8px">\uD83D\uDCB8 \u00BFQui\u00E9n adelant\u00F3 este importe?</div>' +
    tecInputs +
    '<div class="adelanto-estado" style="font-size:11px;font-weight:600;color:'+estadoColor+';margin-top:6px;text-align:right">'+estadoTxt+'</div>' +
  '</div>';
  if(existing){
    existing.outerHTML = html;
  } else {
    rowEl.insertAdjacentHTML('afterend', html);
  }
}

function onAdelantoInput(itemIdx, tecId, val){
  if(!modalItems[itemIdx].adelantos) modalItems[itemIdx].adelantos = {};
  modalItems[itemIdx].adelantos[tecId] = Number(val||0);
  // Solo actualizar el texto de estado sin re-renderizar (para no perder el foco)
  var adelantos = modalItems[itemIdx].adelantos;
  var totalItem = Number(modalItems[itemIdx].importe||0) * Number(modalItems[itemIdx].qty||1);
  var selTecs = [...document.querySelectorAll('#chips-tec .chip.sel')].map(c=>c.dataset.tid);
  var totalAdelantado = selTecs.reduce(function(a,id){ return a + Number(adelantos[id]||0); }, 0);
  var diferencia = totalItem - totalAdelantado;
  var estadoEl = document.querySelector('#adelanto-row-'+itemIdx+' .adelanto-estado');
  if(estadoEl){
    estadoEl.style.color = Math.abs(diferencia) < 1 ? 'var(--green-text)' : 'var(--yellow-text)';
    estadoEl.textContent = Math.abs(diferencia) < 1 ? '\u2705 Completo' : ('Faltan $ '+fmt(Math.abs(diferencia)));
    // Si está completo, cerrar el bloque después de un momento
    if(Math.abs(diferencia) < 1){
      var bloqueId = '#adelanto-row-'+itemIdx;
      setTimeout(function(){
        var bloque = document.querySelector(bloqueId);
        if(!bloque) return;
        bloque.style.transition = 'opacity .4s, max-height .4s';
        bloque.style.overflow = 'hidden';
        bloque.style.opacity = '0';
        bloque.style.maxHeight = '0';
        bloque.style.padding = '0 12px';
      }, 800);
    }
  }
  updateResumen();
}
function syncItems(){
  document.querySelectorAll('.irow').forEach((row,i)=>{
    if(i>=modalItems.length) return;
    const q=row.querySelector('.iq'), d=row.querySelector('.id'), im=row.querySelector('.ii');
    if(q) modalItems[i].qty=q.value;
    if(d) modalItems[i].desc=d.value;
    if(im) modalItems[i].importe=im.value;
  });
}
function renderItemsList(){
  const el = document.getElementById('items-list');
  if(!el) return;
  el.innerHTML = modalItems.map((item,i)=>
    '<div class="irow">' +
    '<input class="iq" type="number" min="1" value="'+(item.qty||1)+'" style="text-align:center" oninput="syncAndRefresh()">' +
    '<div class="acw"><input class="id" value="'+escH(item.desc||'')+'" placeholder="Descripción" id="idd-'+i+'" autocomplete="off" oninput="syncAndRefresh()"><div id="idd-list-'+i+'" class="acl" style="display:none"></div></div>' +
    '<input class="ii" type="number" min="0" value="'+(item.importe||'')+'" placeholder="0" oninput="syncAndRefresh()">' +
    '<button class="tbtn '+(item.tipo||'ingreso')+'" onclick="cycleType('+i+')">'+ucFirst(item.tipo||'ingreso')+'</button>' +
    '<button class="dbtn" onclick="removeItem('+i+')">×</button>' +
    '</div>'
  ).join('');
  modalItems.forEach((_,i)=>setupAC('idd-'+i,'idd-list-'+i,()=>db.itemDescs));
  // Renderizar bloques de adelanto para ítems costo/gasto existentes
  const rows = document.querySelectorAll('.irow');
  modalItems.forEach(function(item,i){ if(item.tipo === 'costo' && rows[i]) renderAdelantoRow(i, rows[i]); });
  updateResumen();
}
function syncAndRefresh(){
  // Guardar valores de reparto antes de re-renderizar
  const repartoVals = {};
  document.querySelectorAll('[id^="rep-"]').forEach(el=>{
    repartoVals[el.id] = el.value;
  });
  syncItems();
  updateResumen();
  // Restaurar valores de reparto si el usuario ya los había tocado
  Object.entries(repartoVals).forEach(([id, val])=>{
    const el = document.getElementById(id);
    if(el && val !== '') el.value = val;
  });
}

// Estado externo del reparto - persiste entre re-renders
let repartoEditado = {}; // {tecId: valor} solo los que el usuario tocó

function updateResumen(){
  const el = document.getElementById('resumen-box');
  if(!el) return;
  // Sincronizar modalItems con los valores actuales del DOM
  document.querySelectorAll('.irow').forEach(function(row, i){
    if(i>=modalItems.length) return;
    var q=row.querySelector('.iq'), im=row.querySelector('.ii');
    if(q)  modalItems[i].qty     = q.value;
    if(im) modalItems[i].importe = im.value;
    // El tipo NO se sobreescribe acá — lo maneja cycleType
  });
  // Calcular sumas usando modalItems (tiene el tipo correcto) + DOM (tiene el importe actualizado)
  const sum = tipo => {
    let total = 0;
    document.querySelectorAll('.irow').forEach(function(row, i){
      var tipoVal = modalItems[i] ? (modalItems[i].tipo||'ingreso') : 'ingreso';
      if(tipoVal !== tipo) return;
      var imp = Number((row.querySelector('.ii')||{}).value||0);
      var qty = Number((row.querySelector('.iq')||{}).value||1);
      total += imp * qty;
    });
    return total;
  };
  const ing=sum('ingreso'), cos=sum('costo'), gas=sum('gasto');
  const totC=ing+cos, base=ing-gas;
  const selTecs = [...document.querySelectorAll('#chips-tec .chip.sel')].map(c=>c.dataset.tid);
  const n = selTecs.length || 1;

  // Calcular valores: editados usan repartoEditado, el resto reparte el sobrante
  const vals = calcReparto(selTecs, base);

  // Calcular adelantos por técnico (suma de todos los ítems costo/gasto)
  const adelantosPorTec = {};
  modalItems.forEach(function(item){
    if(item.tipo !== 'costo') return;
    var adv = item.adelantos || {};
    selTecs.forEach(function(id){ adelantosPorTec[id] = (adelantosPorTec[id]||0) + Number(adv[id]||0); });
  });

  let tecRows = selTecs.map((id,i)=>{
    const t = db.tecnicos.find(x=>x.id===id);
    const nombre = t ? t.nombre : id;
    const adv = adelantosPorTec[id] || 0;
    const total = vals[id] + adv;
    const advStr = adv > 0 ? '<span style="font-size:11px;color:var(--blue-text);font-weight:600;white-space:nowrap">+$'+fmt(adv)+' mat</span>' : '';
    const totalStr = adv > 0 ? '<span style="font-size:12px;font-weight:800;color:var(--green-text);white-space:nowrap">=$'+fmt(total)+'</span>' : '';
    return '<div style="margin-top:6px"><div style="display:flex;align-items:center;gap:6px">' +
      '<span style="min-width:52px;font-size:13px;font-weight:500;color:var(--green-text)">'+nombre+'</span>' +
      '<input type="number" id="rep-'+id+'" value="'+vals[id]+'" ' +
      'style="flex:1;padding:6px 10px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none" ' +
      'oninput="onRepartoInput(this,\''+id+'\')">'+
      advStr + totalStr +
    '</div></div>';
  }).join('');

  el.innerHTML =
    // ── TOTAL ───────────────────────────────────────────────────────

function calcReparto(selTecs, base){
  const editadosIds  = Object.keys(repartoEditado).filter(id => selTecs.includes(id));
  const libresIds    = selTecs.filter(id => !editadosIds.includes(id));
  const sumaEditados = editadosIds.reduce((a,id)=>a+repartoEditado[id], 0);
  const sobrante     = base - sumaEditados;
  const nLibres      = libresIds.length || 1;
  const each         = Math.floor(sobrante / nLibres);

  const vals = {};
  editadosIds.forEach(id => vals[id] = repartoEditado[id]);
  libresIds.forEach((id,i) => {
    // El último libre absorbe el redondeo
    vals[id] = (i === libresIds.length-1) ? sobrante - each*(libresIds.length-1) : each;
  });
  return vals;
}

function resetReparto(){
  repartoEditado = {};
  updateResumen();
}

function onRepartoInput(inp, editedId){
  // Registrar el valor editado en el estado externo
  repartoEditado[editedId] = Number(inp.value || 0);

  // Recalcular y actualizar los campos libres sin re-renderizar
  const selTecs = [...document.querySelectorAll('#chips-tec .chip.sel')].map(c=>c.dataset.tid);
  const sum = tipo => modalItems.filter(i=>i.tipo===tipo).reduce((a,i)=>a+Number(i.importe||0)*Number(i.qty||1),0);
  const base = sum('ingreso') - sum('gasto');

  const vals = calcReparto(selTecs, base);

  // Solo actualizar los campos que NO fueron editados por el usuario
  selTecs.forEach(id=>{
    if(id === editedId) return; // no tocar el que está siendo editado
    if(repartoEditado[id] !== undefined) return; // no tocar otros editados
    const el = document.getElementById('rep-'+id);
    if(el) el.value = vals[id];
  });
}

function verificarConflictoHora(){
  var fecha = (document.getElementById('m-fecha')||{}).value||'';
  var hora  = (document.getElementById('m-hora')||{}).value||'';
  var warnEl = document.getElementById('hora-conflict-warn');
  if(!warnEl) return;
  if(!fecha || !hora){ warnEl.style.display='none'; return; }
  // Buscar pedidos en esa fecha y hora (excluyendo el actual si se está editando)
  var editingId = window._editingServiceId ? Number(window._editingServiceId) : null;
  var conflictos = db.servicios.filter(function(s){
    return !s.facturado && s.fecha===fecha && s.hora===hora && Number(s.id)!==editingId;
  });
  if(conflictos.length){
    var nombres = conflictos.map(function(s){ return s.cliente; }).join(', ');
    warnEl.textContent = '⚠️ Ya hay un pedido a esa hora: '+nombres;
    warnEl.style.display = 'block';
  } else {
    warnEl.style.display = 'none';
  }
}

  if(id){

    if(t){ t.nombre=nom; t.pct=pct; }

function showModal(html){
  const ov = document.createElement('div');
  ov.className = 'modal-ov';
  ov.addEventListener('click', e=>{ if(e.target===ov) closeModal(); });
  ov.innerHTML = '<div class="modal"><div class="mhandle"></div>'+html+'</div>';
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  root.appendChild(ov);
  // Push estado para que el botón Atrás del teléfono cierre el modal
  history.pushState({modal:true}, '');
}
function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
  // Si el estado actual es de modal, volver al estado anterior sin disparar el evento
  if(history.state && history.state.modal) history.back();
}

// ── BOTÓN ATRÁS DEL TELÉFONO ────────────────────────────────────────
window.addEventListener('popstate', function(e){
  var modalRoot = document.getElementById('modal-root');
  // Si hay un modal abierto, cerrarlo sin confirmación
  if(modalRoot && modalRoot.innerHTML.trim() !== ''){
    modalRoot.innerHTML = '';
    return;
  }
  // Si no hay modal, preguntar si quiere salir de la app
  if(currentUser){
    if(confirm('¿Salir de la aplicación?')){
      auth.signOut();
    } else {
      // Volver a poner el estado para que el botón atrás funcione de nuevo
      history.pushState(null, '');
    }
  }
});

var _logoBase64 = null; // logo nuevo seleccionado (base64)
var _quitarLogo = false;

function previewLogo(input){
  var file = input.files[0];
  if(!file) return;
  if(file.size > 512000){ showAlert('El archivo es muy grande. Máximo 500KB.'); input.value=''; return; }
  var reader = new FileReader();
  reader.onload = function(e){
    _logoBase64 = e.target.result;
    _quitarLogo = false;
    var prev = document.getElementById('cfg-logo-preview');
    if(prev) prev.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--surface2);border-radius:var(--radius-sm)">' +
      '<img src="'+_logoBase64+'" style="width:60px;height:60px;object-fit:contain;border-radius:6px;background:#fff;padding:3px">' +
      '<span style="font-size:12px;color:var(--green-text);font-weight:600">✅ Logo listo para guardar</span></div>';
  };
  reader.readAsDataURL(file);
}

function quitarLogo(){
  _logoBase64 = null;
  _quitarLogo = true;
  closeModal();
  abrirConfiguracion();
  db.config.logo = '';
  saveDB();
}

function guardarConfiguracion(){
  var nom = document.getElementById('cfg-nombre').value.trim();
  if(!nom){ showAlert('El nombre de la empresa es obligatorio'); return; }
  var logoGuardar = _quitarLogo ? '' : (_logoBase64 || (db.config && db.config.logo) || '');
  db.config = {
    nombre:           nom,
    subtitulo:        document.getElementById('cfg-subtitulo').value.trim(),
    cuit:             document.getElementById('cfg-cuit').value.trim(),
    telefono:         document.getElementById('cfg-tel').value.trim(),
    email:            document.getElementById('cfg-email').value.trim(),
    web:              document.getElementById('cfg-web').value.trim(),
    direccion:        document.getElementById('cfg-dir').value.trim(),
    validezPresupuesto: document.getElementById('cfg-validez').value.trim(),
    formasPago:       document.getElementById('cfg-formaspago').value.trim(),
    condicionesPago:  document.getElementById('cfg-pago').value.trim(),
    garantia:         document.getElementById('cfg-garantia').value.trim(),
    piePresupuesto:   document.getElementById('cfg-pie').value.trim(),
    logo:             logoGuardar,
  };
  _logoBase64 = null;
  _quitarLogo = false;
  saveDB();
  actualizarLogoApp();
  closeModal();
  showAlert('✅ Configuración guardada correctamente');
}

function fillLoginSelect(){
  const sel = document.getElementById('login-user');
  if(!sel) return; // Con Firebase no hay select de usuario
  sel.innerHTML = '<option value="admin">Administrador</option>';
  db.tecnicos.forEach(t=>{
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.nombre + ' (Técnico)';
    sel.appendChild(opt);
  });
}

function actualizarLogoApp(){
  var logo = db.config && db.config.logo ? db.config.logo : '';
  // Logo en login
  var loginLogo = document.getElementById('logo-empresa-login');
  if(loginLogo && logo){
    loginLogo.innerHTML = '<img src="'+logo+'" style="width:160px;height:160px;object-fit:contain;border-radius:16px">';
  }
  // Logo en topbar
  var topbarLogo = document.getElementById('logo-topbar');
  if(topbarLogo && logo){
    topbarLogo.innerHTML = '<img src="'+logo+'" style="width:36px;height:36px;object-fit:contain;border-radius:6px">';
  }
}

function doLogin(){
  var email = (document.getElementById('login-email')||{}).value||'';
  var pass  = (document.getElementById('login-pass')||{}).value||'';
  var errEl = document.getElementById('login-error');
  var btn   = document.getElementById('login-btn');
  if(!email||!pass){
    if(errEl){errEl.textContent='Completá email y contraseña';errEl.style.display='block';}
    return;
  }
  if(errEl) errEl.style.display='none';
  if(btn){ btn.textContent='Ingresando...'; btn.disabled=true; }
  // Timeout de seguridad: si en 10 segundos no hubo respuesta, reactivar
  var timeout = setTimeout(function(){
    if(btn&&btn.disabled){ btn.textContent='Ingresar'; btn.disabled=false; }
    if(errEl){ errEl.textContent='Tiempo de espera agotado. Intentá de nuevo.'; errEl.style.display='block'; }
  }, 10000);
  auth.signInWithEmailAndPassword(email, pass)
    .then(function(){ clearTimeout(timeout); })
    .catch(function(err){
      clearTimeout(timeout);
      if(btn){ btn.textContent='Ingresar'; btn.disabled=false; }
      var msg = 'Error al ingresar';
      if(err.code==='auth/wrong-password'||err.code==='auth/invalid-credential') msg='Contraseña incorrecta';
      else if(err.code==='auth/user-not-found') msg='Usuario no encontrado';
      else if(err.code==='auth/invalid-email') msg='Email inválido';
      else if(err.code==='auth/too-many-requests') msg='Demasiados intentos. Esperá unos minutos.';
      if(errEl){ errEl.textContent=msg; errEl.style.display='block'; }
    });
}
function doLogout(){
  auth.signOut();
}

}

// Capitalizar primera letra en todos los inputs y textareas
document.addEventListener('input', function(e){
  var el = e.target;
  if((el.tagName==='INPUT' && el.type!=='email' && el.type!=='password' && el.type!=='number' && el.type!=='date' && el.type!=='month' && el.type!=='tel') || el.tagName==='TEXTAREA'){
    var val = el.value;
    if(val.length === 1 && val !== val.toUpperCase()){
      el.value = val.charAt(0).toUpperCase() + val.slice(1);
    } else if(val.length > 0 && el.selectionStart === 1){
      el.value = val.charAt(0).toUpperCase() + val.slice(1);
    }
  }
});
